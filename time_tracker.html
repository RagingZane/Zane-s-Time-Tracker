                <div class="detail-tag">
                    <span>${name}</span>
                    <button class="edit-btn" onclick="editItem('content', '${contentKey}', '${name}')" title="编辑">✏️</button>
                    <button class="delete-btn-tag" onclick="deleteItem('content', '${contentKey}', '${name}')" title="删除">×</button>
                </div>
            `).join('');
        }

        function renderDetailList() {
            const topic = document.getElementById('activityForDetail').value;
            const activity = document.getElementById('detailForContent').value;
            const content = document.getElementById('contentForDetail').value;
            const itemList = document.getElementById('itemList');

            if (!content || content === 'custom') {
                itemList.innerHTML = '';
                return;
            }

            const detailKey = `${topic}|${activity}|${content}`;
            const details = categories.details[detailKey] || [];

            itemList.innerHTML = details.map(name => `
                <div class="detail-tag">
                    <span>${name}</span>
                    <button class="edit-btn" onclick="editItem('detail', '${detailKey}', '${name}')" title="编辑">✏️</button>
                    <button class="delete-btn-tag" onclick="deleteItem('detail', '${detailKey}', '${name}')" title="删除">×</button>
                </div>
            `).join('');
        }

        function addMainActivity() {
            const input = document.getElementById('newMainActivity');
            const name = input.value.trim();
            if (!name) {
                alert('请输入主题名称');
                return;
            }
            if (categories.topics.includes(name)) {
                alert('该主题已存在');
                return;
            }
            categories.topics.push(name);
            categories.activities[name] = [];
            saveData();
            input.value = '';
            renderMainActivityList();
            renderTopicSelect();
            alert('添加成功！');
        }

        function editMainActivity(oldName) {
            const newName = prompt('请输入新的主题名称：', oldName);
            if (!newName || newName === oldName) return;
            if (categories.topics.includes(newName)) {
                alert('该名称已存在');
                return;
            }
            const oldActivities = categories.activities[oldName] || [];
            categories.activities[newName] = oldActivities;
            delete categories.activities[oldName];
            categories.topics = categories.topics.map(t => t === oldName ? newName : t);
            data.records.forEach(r => {
                if (r.activity === oldName) r.activity = newName;
            });
            saveData();
            renderMainActivityList();
            renderTopicSelect();
            updateStats();
        }

        function deleteMainActivity(name) {
            if (!confirm(`确定要删除主题 "${name}" 吗？\n这不会删除已有的记录，但该主题将不再可用。`)) return;
            categories.topics = categories.topics.filter(t => t !== name);
            delete categories.activities[name];
            saveData();
            renderMainActivityList();
            renderTopicSelect();
            updateStats();
        }

        function addItem() {
            const topic = document.getElementById('activityForDetail').value;
            const activity = document.getElementById('detailForContent').value;
            const content = document.getElementById('contentForDetail').value;
            const input = document.getElementById('newItem');
            const name = input.value.trim();

            if (!name) {
                alert('请输入项目名称');
                return;
            }

            if (!topic) {
                alert('请先选择主题');
                return;
            }

            if (!activity || activity === 'custom') {
                if (categories.activities[topic].includes(name)) {
                    alert('该活动已存在');
                    return;
                }
                categories.activities[topic].push(name);
                saveData();
                input.value = '';
                renderActivityList();
                return;
            }

            if (!content || content === 'custom') {
                const contentKey = `${topic}|${activity}`;
                if (!categories.contents[contentKey]) categories.contents[contentKey] = [];
                if (categories.contents[contentKey].includes(name)) {
                    alert('该内容已存在');
                    return;
                }
                categories.contents[contentKey].push(name);
                saveData();
                input.value = '';
                renderContentList();
                return;
            }

            const detailKey = `${topic}|${activity}|${content}`;
            if (!categories.details[detailKey]) categories.details[detailKey] = [];
            if (categories.details[detailKey].includes(name)) {
                alert('该详情已存在');
                return;
            }
            categories.details[detailKey].push(name);
            saveData();
            input.value = '';
            renderDetailList();
        }

        function editItem(type, key, oldName) {
            const newName = prompt('请输入新的名称：', oldName);
            if (!newName || newName === oldName) return;

            if (type === 'activity') {
                if (categories.activities[key].includes(newName)) {
                    alert('该名称已存在');
                    return;
                }
                categories.activities[key] = categories.activities[key].map(n => n === oldName ? newName : n);
                data.records.forEach(r => {
                    if (r.detail1 === oldName) r.detail1 = newName;
                });
            } else if (type === 'content') {
                if (!categories.contents[key]) categories.contents[key] = [];
                if (categories.contents[key].includes(newName)) {
                    alert('该名称已存在');
                    return;
                }
                categories.contents[key] = categories.contents[key].map(n => n === oldName ? newName : n);
                data.records.forEach(r => {
                    if (r.detail2 === oldName) r.detail2 = newName;
                });
            } else if (type === 'detail') {
                if (!categories.details[key]) categories.details[key] = [];
                if (categories.details[key].includes(newName)) {
                    alert('该名称已存在');
                    return;
                }
                categories.details[key] = categories.details[key].map(n => n === oldName ? newName : n);
                data.records.forEach(r => {
                    if (r.detail3 === oldName) r.detail3 = newName;
                });
            }

            saveData();
            if (type === 'activity') renderActivityList();
            else if (type === 'content') renderContentList();
            else renderDetailList();
            updateStats();
        }

        function deleteItem(type, key, name) {
            if (!confirm(`确定要删除 "${name}" 吗？\n这不会删除已有的记录。`)) return;

            if (type === 'activity') {
                categories.activities[key] = categories.activities[key].filter(n => n !== name);
            } else if (type === 'content') {
                categories.contents[key] = (categories.contents[key] || []).filter(n => n !== name);
            } else if (type === 'detail') {
                categories.details[key] = (categories.details[key] || []).filter(n => n !== name);
            }

            saveData();
            if (type === 'activity') renderActivityList();
            else if (type === 'content') renderContentList();
            else renderDetailList();
            updateStats();
        }

        document.addEventListener('DOMContentLoaded', async function() {
            loadTheme();
            document.getElementById('recordDate').value = new Date().toISOString().split('T')[0];
            await loadData();
            updateModeIndicator();
            initActivityManagement();
            updateStats();
        });

        function updateModeIndicator() {
            const indicator = document.getElementById('modeIndicator');
            if (isServerMode) {
                indicator.textContent = '🌐 云同步模式';
                indicator.className = 'mode-indicator server-mode';
            } else {
                indicator.textContent = '💾 本地模式';
                indicator.className = 'mode-indicator local-mode';
            }
        }
    </script>
</body>
</html>
